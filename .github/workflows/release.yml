name: release

# Build standalone binaries and publish a GitHub Release on every push to main.
on:
  push:
    branches: [main]

# Allow the workflow to create tags and releases via GITHUB_TOKEN.
permissions:
  contents: write

# Never run two releases at once; let an in-progress one finish.
concurrency:
  group: release
  cancel-in-progress: false

jobs:
  release:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: 1.3.10

      - name: Install dependencies
        run: bun install --frozen-lockfile

      - name: Compute version
        id: version
        run: echo "tag=v0.0.${{ github.run_number }}" >> "$GITHUB_OUTPUT"

      - name: Build binaries
        run: |
          set -euo pipefail
          mkdir -p dist
          for target in darwin-arm64 linux-x64 linux-arm64; do
            echo "::group::build $target"
            bun build ./index.jsx --compile --target="bun-$target" \
              --outfile "dist/orbit-diff-$target"
            echo "::endgroup::"
          done
          ls -lh dist

      - name: Publish release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ steps.version.outputs.tag }}
          name: ${{ steps.version.outputs.tag }}
          target_commitish: ${{ github.sha }}
          generate_release_notes: true
          files: dist/orbit-diff-*
